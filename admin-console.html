function renderUsers(){let users=get('users'), q=state.query.toLowerCase(), ids=activeFacilityIds();let rows=users.filter(u=>(full(u)+u.employeeNumber).toLowerCase().includes(q)&&(isSuper()||u.id==currentUser.id||(u.facilityIds||[]).some(id=>ids.includes(id))));main.innerHTML=page('Users & Authentication','Manage workforce access, role scope, and authentication policy',`<button class="btn primary" onclick="editUser()"><i data-lucide="plus"></i>Add User</button>`)+`<div class="card"><div class="card-b"><div class="tabs"><button class="tab ${state.tab!='auth'?'active':''}" onclick="state.tab='users';render()">Users</button><button class="tab ${state.tab=='auth'?'active':''}" onclick="state.tab='auth';render()">Authentication</button></div>${state.tab=='auth'?authTab():`<div class="toolbar" style="margin-bottom:12px"><input class="field" placeholder="Search name or employee #" oninput="state.query=this.value;render()" value="${state.query}"><select class="field" onchange="state.filters.role=this.value;render()"><option value="">All roles</option>${['SuperUser','FacilityManager','QASpecialist','FieldSpecialist','Vendor'].map(r=>`<option ${state.filters.role==r?'selected':''}>${r}</option>`)}</select></div><div class="table-wrap"><table><thead><tr><th>Name</th><th>Employee #</th><th>Country</th><th>Role</th><th>Department</th><th>Phone</th><th>Status</th><th>Actions</th></tr></thead><tbody>${rows.filter(u=>!state.filters.role||u.userType==state.filters.role).map(u=>`<tr><td class="user-name-cell">${avatar(u)}</td><td>${u.employeeNumber}</td><td>${u.country}</td><td>${u.userType}</td><td>${u.department}</td><td>${u.phone}</td><td>${badge(u.status)}</td><td><div class="table-actions"><button class="table-icon" title="Edit user" aria-label="Edit user" onclick="editUser('${u.id}')"><i data-lucide="pencil"></i></button><button class="table-icon" data-state="${u.status=='Active'?'active':'inactive'}" title="${u.status=='Active'?'Deactivate':'Activate'} user" aria-label="${u.status=='Active'?'Deactivate':'Activate'} user" onclick="toggleUser('${u.id}')"><i data-lucide="${u.status=='Active'?'user-x':'user-check'}"></i></button><button class="table-icon danger" title="Delete user" aria-label="Delete user" onclick="del('users','${u.id}')"><i data-lucide="trash-2"></i></button></div></td></tr>`).join('')||emptyRow(8,'No users match filters','Try clearing search or role filter.',`state.query='';state.filters={};render()`)}</tbody></table></div>`}</div></div>`}
function authTab(){let a=get('auth_settings');return `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr))">${a.map(x=>`<div class="card" style="box-shadow:none"><div class="card-b"><h2 style="margin:0 0 8px">${x.userType}</h2><p class="muted">Updates how this role signs into mobile and desktop apps.</p><label>Mobile Auth</label><select class="field" style="width:100%;margin:4px 0 10px" onchange="saveAuth('${x.userType}','mobileAuth',this.value)">${['SMS_OTP','Biometric','None'].map(v=>`<option ${x.mobileAuth==v?'selected':''}>${v}</option>`)}</select><label>Desktop Auth</label><select class="field" style="width:100%;margin-top:4px" onchange="saveAuth('${x.userType}','desktopAuth',this.value)">${['Email_OTP','None'].map(v=>`<option ${x.desktopAuth==v?'selected':''}>${v}</option>`)}</select></div></div>`).join('')}</div>`}
function renderVendors(){let q=state.query.toLowerCase(), rows=get('vendors').filter(v=>(v.companyName+v.specialisation).toLowerCase().includes(q));main.innerHTML=page('Vendors','Vendor performance, availability, and escalation readiness',`<input class="field" placeholder="Search vendors" oninput="state.query=this.value;render()" value="${state.query}"><button class="btn primary" onclick="editVendor()"><i data-lucide="plus"></i>Add Vendor</button>`)+tableCard(['Company','Specialisation','Representative','Country','Phone','Email','Rating','Jobs','Actions'],rows.map(v=>[v.companyName,v.specialisation,v.representativeFirst+' '+v.representativeLast,v.country,v.phone,v.email,'★ '+v.rating,v.totalJobsCompleted,renderTableActions([{label:'View vendor',icon:'panel-right-open',action:`openVendor('${v.id}')`},{label:'Edit vendor',icon:'pencil',action:`editVendor('${v.id}')`},{label:'Delete vendor',icon:'trash-2',danger:true,action:`del('vendors','${v.id}')`}])]))}
function renderReports(){let rows=scoped(get('reports'));let filtered=rows.filter(r=>(r.id+by('facilities',r.facilityId).name+full(by('users',r.responsibleQAId))).toLowerCase().includes(state.query.toLowerCase()));main.innerHTML=page('Reports','Inspection review, approval, and audit trail',`<input class="field" placeholder="Search reports" oninput="state.query=this.value;render()" value="${state.query}">`)+`<div class="card"><div class="table-wrap"><table><thead><tr><th>ID</th><th>Facility</th><th>Category</th><th>Sub-category</th><th>QA</th><th>Checklist</th><th>Date</th><th>Score</th><th>Status</th><th></th></tr></thead><tbody>${filtered.map(r=>`<tr><td class="row-title">${r.id}</td><td>${by('facilities',r.facilityId).name}</td><td>${by('categories',r.categoryId).name}</td><td>${by('subcategories',r.subCategoryId).name}</td><td>${full(by('users',r.responsibleQAId))}</td><td>${by('checklists',r.checklistId).name}</td><td>${fmt(r.dateCreated)}</td><td><b style="color:${r.inspectionScore>=85?'var(--green)':r.inspectionScore>=70?'var(--amber)':'var(--red)'}">${r.inspectionScore||'--'}%</b></td><td>${badge(r.status)}</td><td>${renderTableActions([{label:'Open report',icon:'panel-right-open',action:`openDetail('Report','${r.id}')`},...(isSuper()?[{label:'Delete report',icon:'trash-2',danger:true,action:`deleteReport('${r.id}')`}]:[])])}</td></tr>`).join('')||emptyRow(10,'No reports match filters','Try a different facility or clear the search.',`state.query='';render()`)}</tbody></table></div></div>`}
function renderEntity(kind){let rows=scoped(get(kind));let filtered=rows.filter(x=>(JSON.stringify(x)).toLowerCase().includes(state.query.toLowerCase())&&(!state.filters.status||x.workflowStatus==state.filters.status));let title=kind[0].toUpperCase()+kind.slice(1);main.innerHTML=page(title,`Browse and act on ${kind} across the selected facility`,kind=='incidents'?`<button class="btn primary" onclick="editIncident()"><i data-lucide="plus"></i>Create Incident</button>`:'')+`<div class="card"><div class="card-b toolbar"><input class="field" placeholder="Search ${kind}" oninput="state.query=this.value;render()" value="${state.query}"><select class="field" onchange="state.filters.status=this.value;render()"><option value="">All statuses</option>${[...new Set(rows.map(x=>x.workflowStatus))].filter(Boolean).map(s=>`<option ${state.filters.status==s?'selected':''}>${s}</option>`)}</select></div><div class="table-wrap"><table><thead><tr>${entityHeads(kind).map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${filtered.slice(0,25).map(x=>entityRow(kind,x)).join('')||emptyRow(entityHeads(kind).length,`No ${kind} match filters`,'Try clearing the search or status filter.',`state.query='';state.filters={};render()`)}</tbody></table></div></div>`}
function entityHeads(k){return k=='incidents'?['ID','Facility','Item','Executor','Priority','SLA','Status','Due','']:k=='jobs'?['ID','Incident','Item','Executor','Vendor','Priority','Status','Due','']:['ID','Related','Question','Owner','Priority','Status','Date','']}
function entityRow(k,x){if(k=='incidents')return `<tr><td class="row-title">${x.id}</td><td>${by('facilities',x.facilityId).name}</td><td>${by('items',x.itemId).name}</td><td>${avatar(by('users',x.executorId))}</td><td>${badge(x.priority)}</td><td>${badge(x.slaStatus)}</td><td>${badge(x.workflowStatus)}</td><td>${fmt(x.dueDate)}</td><td>${renderTableActions([{label:'View incident',icon:'panel-right-open',action:`openDetail('Incident','${x.id}')`}])}</td></tr>`;if(k=='jobs')return `<tr><td class="row-title">${x.id}</td><td>${x.relatedIncidentId}</td><td>${by('items',x.itemId).name}</td><td>${avatar(by('users',x.executorId))}</td><td>${x.vendorId?by('vendors',x.vendorId).companyName:(x.vendorAssistanceNeeded?badge('Unassigned'):'-')}</td><td>${badge(x.priority)}</td><td>${badge(x.workflowStatus)}</td><td>${fmt(x.dueDate)}</td><td>${renderTableActions([{label:'View job',icon:'panel-right-open',action:`openDetail('Job','${x.id}')`}])}</td></tr>`;return `<tr><td class="row-title">${x.id}</td><td>${x.relatedJobId||x.relatedIncidentId||x.relatedReportId||'-'}</td><td>${x.text}</td><td>${avatar(by('users',x.responsibleExecutorId))}</td><td>${badge(x.priority)}</td><td>${badge(x.workflowStatus)}</td><td>${fmt(x.dateCreated)}</td><td>${renderTableActions([{label:'View question',icon:'panel-right-open',action:`openDetail('Question','${x.id}')`}])}</td></tr>`}
function renderSamples(){main.innerHTML=page('Samples & Checklists','Reusable inspection templates and country-specific checklists')+`<div class="grid two"><div class="card"><div class="card-h"><h2>Samples</h2></div><div class="card-b">${get('samples').map(s=>`<div class="action-card"><div><b>${s.name}</b><div class="muted">${s.sections.length} questions</div></div>${badge(by('categories',s.categoryId).name)}</div>`).join('')}</div></div><div class="card"><div class="card-h"><h2>Checklists</h2></div><div class="card-b">${get('checklists').map(c=>`<div class="action-card"><div><b>${c.name}</b><div class="muted">${by('subcategories',c.subCategoryId).name} · ${c.country}</div></div><button class="btn" onclick="toast('Checklist opened')">Open</button></div>`).join('')}</div></div></div>`}
function renderCategories(){main.innerHTML=page('Categories & Items','Facility taxonomy used by reports, incidents, jobs, and AI context')+`<div class="card"><div class="card-b">${get('categories').map(c=>`<h2>${c.name}</h2><p class="muted">${c.description}</p><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin-bottom:18px">${get('subcategories').filter(s=>s.categoryId==c.id).map(s=>`<div class="card" style="box-shadow:none"><div class="card-b"><b>${s.name}</b><div class="muted">${s.description}</div><div class="tags" style="margin-top:10px">${get('items').filter(i=>i.subCategoryId==s.id).map(i=>`<span class="tag">${i.name}</span>`).join('')}</div></div></div>`).join('')}</div>`).join('')}</div></div>`}
function renderAnalytics(){let inc=scoped(get('incidents')), jobs=scoped(get('jobs')), reps=scoped(get('reports'));main.innerHTML=page('Analytics','Operational trends and workload signals')+`<div class="grid kpis"><div class="card kpi"><small>SLA Risk</small><strong>${inc.filter(x=>x.slaStatus!='OnTrack').length}</strong></div><div class="card kpi"><small>Active Jobs</small><strong>${jobs.filter(x=>!['Approved','Closed'].includes(x.workflowStatus)).length}</strong></div><div class="card kpi"><small>Reports Finalized</small><strong>${reps.filter(x=>x.status=='Finalized').length}</strong></div><div class="card kpi"><small>Vendor Escalations</small><strong>${jobs.filter(x=>x.vendorAssistanceNeeded).length}</strong></div></div><div class="grid two" style="margin-top:16px"><div class="card"><div class="card-h"><h2>Inspection Scores</h2></div><div class="card-b"><canvas id="scoreChart"></canvas></div></div><div class="card"><div class="card-h"><h2>Field Workload</h2></div><div class="card-b">${get('users').filter(u=>u.userType=='FieldSpecialist').map(u=>workloadRow(u)).join('')}</div></div></div>`;drawTrend(reps)}
function tableCard(heads,rows){return `<div class="card"><div class="table-wrap"><table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')||emptyRow(heads.length,'No records','There is nothing to show for the current scope.')}</tbody></table></div></div>`}
function emptyRow(n,t,sub='Adjust filters or selected facility to recover results.',action=''){return `<tr><td colspan="${n}">${renderEmptyState(t,sub,action?`<button class="btn" onclick="${action}">Clear filters</button>`:'')}</td></tr>`} function avatar(u){return u?`<span class="entity-row"><span class="avatar">${u.avatarInitials}</span>${full(u)}</span>`:'<span class="muted">Unassigned</span>'}
function workloadRow(u){let open=get('jobs').filter(j=>j.executorId==u.id&&!['Closed','Approved'].includes(j.workflowStatus)).length,p=Math.min(100,open/5*100),c=open>4?'var(--red)':open>2?'var(--amber)':'var(--green)';return `<div class="action-card"><div>${avatar(u)}<div class="muted">${open} active jobs</div></div><div class="workload"><span style="width:${p}%;background:${c}"></span></div></div>`}
function openDetail(type,id){let k=type.toLowerCase()+'s', e=by(k,id); if(!e&&type=='Report')e=by('reports',id); if(!e)return;if(!inScope(e)){toast('This record is outside your facility scope');return}overlay.innerHTML=`<div class="backdrop" onclick="closeOverlay()"></div><aside class="drawer"><div class="panel-head"><div>${renderBreadcrumbs([type+'s',id])}<h2 style="margin:0">${type} ${id}</h2><p class="muted" style="margin:4px 0 0">${type=='Report'?by('facilities',e.facilityId).name:e.facilityId?by('facilities',e.facilityId).name:''}</p></div><button class="icon-btn" onclick="closeOverlay()"><i data-lucide="x"></i></button></div><div class="panel-body">${detailBody(type,e)}</div><div class="drawer-footer">${detailActions(type,e)}</div></aside>`;lucide.createIcons()}
function detailBody(t,e){if(t=='Report')return `<section class="drawer-section"><h3>Summary</h3>${badge(e.status)}<h2 style="font-size:42px;margin:10px 0;color:${e.inspectionScore>=85?'var(--green)':e.inspectionScore>=70?'var(--amber)':'var(--red)'}">${e.inspectionScore||0}%</h2><p>${e.failedItemsCount} failed items · ${e.createdQuestionsCount} questions · ${fmt(e.dateCreated)}</p></section>${isSuper()?reportAdminPanel(e):''}<section class="drawer-section"><h3>Inspection Results</h3>${reportResults(e)}</section><section class="drawer-section"><h3>Related Tasks</h3>${reportTasks(e)}</section><section class="drawer-section"><h3>History</h3>${history(e)||renderEmptyState('No history','Activity will appear here.')}</section>`;if(t=='Job')return `<section class="drawer-section"><h3>Summary</h3>${badge(e.priority)} ${badge(e.workflowStatus)}<p>${e.description}</p><p><b>Incident:</b> ${e.relatedIncidentId}<br><b>Facility:</b> ${by('facilities',e.facilityId).name}<br><b>Item:</b> ${by('items',e.itemId).name}<br><b>Due:</b> ${fmt(e.dueDate)}</p></section><section class="drawer-section"><h3>Assignment</h3><p><b>Executor:</b> ${full(by('users',e.executorId))}<br><b>Vendor:</b> ${e.vendorId?by('vendors',e.vendorId).companyName:'Not assigned'}<br><b>Department:</b> ${e.department}</p>${isSuper()?jobAdminPanel(e):''}</section><section class="drawer-section"><h3>Evidence</h3>${photoUploader('jobs',e.id)}${photos(e.photos)||renderEmptyState('No evidence yet','Uploaded photos and AI analysis will appear here.')}</section><section class="drawer-section"><h3>History</h3>${history(e)||renderEmptyState('No history','Status changes will appear here.')}</section>`;if(t=='Incident')return incidentEditBody(e);return `<section class="drawer-section"><h3>Summary</h3>${badge(e.workflowStatus)}<p>${e.text}</p><p><b>Related:</b> ${e.relatedJobId||e.relatedIncidentId||e.relatedReportId||'-'}</p></section><section class="drawer-section"><h3>Responses</h3>${(e.responses||[]).map(r=>`<div class="action-card"><div><b>${full(by('users',r.userId))}</b><div>${r.text}</div><div class="muted">${rel(r.timestamp)}</div></div></div>`).join('')||renderEmptyState('No responses yet','Replies from assignees will appear here.')}</section><section class="drawer-section"><h3>History</h3>${history(e)||renderEmptyState('No history','Activity will appear here.')}</section>`}
function detailActions(t,e){if(t=='Report')return `${['UnderReview','Submitted'].includes(e.status)?`<button class="btn good" onclick="approveReport('${e.id}')">Approve</button><button class="btn danger" onclick="rejectReport('${e.id}')">Decline</button>`:''}${isSuper()?`<button class="btn danger" onclick="deleteReport('${e.id}')"><i data-lucide="trash-2"></i>Delete</button>`:''}<button class="btn" onclick="window.print()">Export / Print</button>`;if(t=='Job')return `<button class="btn primary" onclick="statusJob('${e.id}','InProgress')">Start Work</button><button class="btn good" onclick="statusJob('${e.id}','UnderReview')">Submit for Review</button><button class="btn" onclick="assignVendor('${e.id}')">Assign Vendor</button>${isSuper()?`<button class="btn" onclick="reassignJob('${e.id}')">Reassign</button>`:''}`;if(t=='Incident')return `<button class="btn" onclick="closeOverlay()">Cancel</button><button class="btn primary" onclick="saveIncidentDetail('${e.id}')">Save</button>`;return `<button class="btn" onclick="closeOverlay()">Close</button>`}
function reportResults(r){let res=r.inspectionResults.length?r.inspectionResults:get('samples').find(s=>s.id==by('checklists',r.checklistId).sampleId).sections.slice(0,6).map((s,i)=>({questionText:s.questionText,itemId:s.linkedItemId,answer:i<r.failedItemsCount?'Fail':'Pass',commentary:i<r.failedItemsCount?'Corrective action required':'Looks compliant'}));return `<div>${res.map(x=>`<div class="action-card"><div><b>${by('items',x.itemId).name}</b><div>${x.questionText}</div><div class="muted">${x.commentary||''}</div></div>${badge(x.answer)}</div>`).join('')}</div>`}
function incidentEditBody(e){let facs=allowedFacilities(), items=get('items'), execs=get('users').filter(u=>u.userType=='FieldSpecialist'&&u.facilityIds.includes(e.facilityId)), qas=get('users').filter(u=>u.userType=='QASpecialist'&&u.facilityIds.includes(e.facilityId));return `<section class="drawer-section"><h3>Editable Details</h3><div class="form-grid">${field('inc_name',e.name)}<div class="form-row"><label>Priority</label><select id="m_inc_priority" class="field">${['Critical','High','Medium','Low'].map(x=>`<option ${e.priority==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="form-row"><label>Facility</label><select id="m_inc_facilityId" class="field" onchange="toast('Save to refresh facility-specific assignees')">${facs.map(f=>`<option value="${f.id}" ${e.facilityId==f.id?'selected':''}>${f.name}</option>`).join('')}</select></div><div class="form-row"><label>Item</label><select id="m_inc_itemId" class="field">${items.map(i=>`<option value="${i.id}" ${e.itemId==i.id?'selected':''}>${i.name}</option>`).join('')}</select></div>${field('inc_location',e.location||'')}${field('inc_dueDate',(e.dueDate||today()).slice(0,10),'date')}<div class="form-row"><label>SLA</label><select id="m_inc_slaStatus" class="field">${['OnTrack','AtRisk','Overdue'].map(x=>`<option ${e.slaStatus==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="form-row"><label>Status</label><select id="m_inc_workflowStatus" class="field">${['Unassigned','AssignedToExecutor','InProgress','UnderReview','Approved','Closed'].map(x=>`<option ${e.workflowStatus==x?'selected':''}>${x}</option>`).join('')}</select></div><div class="form-row"><label>Executor</label><select id="m_inc_executorId" class="field"><option value="">Unassigned</option>${execs.map(u=>`<option value="${u.id}" ${e.executorId==u.id?'selected':''}>${full(u)}</option>`).join('')}</select></div><div class="form-row"><label>QA Owner</label><select id="m_inc_qaId" class="field"><option value="">Unassigned</option>${qas.map(u=>`<option value="${u.id}" ${e.qaId==u.id?'selected':''}>${full(u)}</option>`).join('')}</select></div><div class="form-row" style="grid-column:1/-1"><label>Description</label><textarea id="m_inc_description" class="field">${e.description||''}</textarea></div></div></section><section class="drawer-section"><h3>Evidence</h3>${photoUploader('incidents',e.id)}${photos(e.photos)||renderEmptyState('No photos yet','Incident evidence will appear here after upload.')}</section><section class="drawer-section"><h3>History</h3>${history(e)||renderEmptyState('No history','Activity will appear here.')}</section>`}
function reportAdminPanel(r){return `<section class="drawer-section"><h3>Super User Controls</h3><div class="form-grid"><div class="form-row"><label>QA Owner</label><select class="field" onchange="assignReportQA('${r.id}',this.value)">${get('users').filter(u=>u.userType=='QASpecialist').map(u=>`<option value="${u.id}" ${r.responsibleQAId==u.id?'selected':''}>${full(u)}</option>`).join('')}</select></div><div class="form-row"><label>Report Status</label><select class="field" onchange="setReportStatus('${r.id}',this.value)">${['Draft','Assigned','Submitted','UnderReview','Finalized','Rejected'].map(s=>`<option ${r.status==s?'selected':''}>${s}</option>`).join('')}</select></div></div></section>`}
function jobAdminPanel(j){return `<div class="form-grid" style="margin-top:12px"><div class="form-row"><label>Executor</label><select class="field" onchange="setJobExecutor('${j.id}',this.value)"><option value="">Unassigned</option>${get('users').filter(u=>u.userType=='FieldSpecialist'&&u.facilityIds.includes(j.facilityId)).map(u=>`<option value="${u.id}" ${j.executorId==u.id?'selected':''}>${full(u)}</option>`).join('')}</select></div><div class="form-row"><label>Task Status</label><select class="field" onchange="statusJob('${j.id}',this.value)">${['Unassigned','AssignedToExecutor','InProgress','UnderReview','AssignedToVendor','Approved','Closed'].map(s=>`<option ${j.workflowStatus==s?'selected':''}>${s}</option>`).join('')}</select></div></div>`}
function incidentAdminPanel(i){return `<div class="form-grid" style="margin-top:12px"><div class="form-row"><label>Executor</label><select class="field" onchange="setIncidentExecutor('${i.id}',this.value)"><option value="">Unassigned</option>${get('users').filter(u=>u.userType=='FieldSpecialist'&&u.facilityIds.includes(i.facilityId)).map(u=>`<option value="${u.id}" ${i.executorId==u.id?'selected':''}>${full(u)}</option>`).join('')}</select></div><div class="form-row"><label>Incident Status</label><select class="field" onchange="statusIncident('${i.id}',this.value)">${['Unassigned','AssignedToExecutor','InProgress','UnderReview','Approved','Closed'].map(s=>`<option ${i.workflowStatus==s?'selected':''}>${s}</option>`).join('')}</select></div></div>`}
function reportTasks(r){let ids=(r.inspectionResults||[]).map(x=>x.incidentId).filter(Boolean), tasks=get('jobs').filter(j=>ids.includes(j.relatedIncidentId)||j.qaId==r.responsibleQAId&&j.facilityId==r.facilityId&&new Date(j.dateCreated)>=new Date(r.dateCreated));return tasks.length?tasks.slice(0,8).map(j=>`<div class="action-card"><div><b>${j.id}</b><div>${j.description}</div><div class="muted">${full(by('users',j.executorId))} · ${fmt(j.dueDate)}</div></div><div style="display:grid;gap:6px;justify-items:end">${badge(j.workflowStatus)}${isSuper()?renderTableActions([{label:'Open task',icon:'panel-right-open',action:`openDetail('Job','${j.id}')`}]) : ''}</div></div>`).join(''):renderEmptyState('No related tasks','Failed inspection items will create tasks after submission.')}
function history(e){return (e.historyLog||[]).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(h=>`<div class="activity-item"><span class="avatar">${h.userName.split(' ').map(x=>x[0]).join('').slice(0,2)}</span><div><b>${h.action}</b><div class="muted">${h.userName} · ${rel(h.timestamp)}</div>${h.detail?`<div>${h.detail}</div>`:''}</div></div>`).join('')}
function photoUploader(k,id){return `<label class="btn primary"><i data-lucide="camera"></i>Upload Photo<input type="file" accept="image/*" class="hidden" onchange="uploadPhoto('${k}','${id}',this.files[0])"></label><div id="scanTarget"></div>`}
function photos(ps=[]){return ps.map(p=>`<div class="ai-card"><div class="scan-box"><img src="${p.url}" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=muted>Photo placeholder</span>'"></div>${aiCard(p.aiAnalysis)}</div>`).join('')}
function aiCard(a){if(!a)return'';return `<div><b>AI Analysis</b> <span class="muted">${a.confidence}%</span><br>Detected: ${a.detectedObject}<br>Condition: ${badge(a.condition)} ${a.conditionLabel}<div class="tags">${a.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>`}
function analyze(ctx){let it=by('items',ctx.itemId)||{}, cat=by('categories',it.categoryId)||{name:'Branch'}, pools={ATM:['Cash Acceptor','Card Reader','Screen','Receipt Printer'],Branch:['CCTV Camera','Emergency Light','Fire Extinguisher','AC Unit'],Office:['Access Terminal','Fire Alarm Panel','UPS System']}, cond=cat.name=='Office'?['Good','WornNormal']:['Good','WornNormal','Damaged','Critical'];let c=cond[Math.floor(Math.random()*cond.length)];return{detectedObject:(pools[cat.name]||pools.Branch)[Math.floor(Math.random()*(pools[cat.name]||pools.Branch).length)],condition:c,conditionLabel:{Good:'Good condition',WornNormal:'Normal wear visible',Damaged:'Damage detected',Critical:'Critical repair needed'}[c],confidence:78+Math.floor(Math.random()*20),tags:[cat.name.toLowerCase(),'maintenance-due']}}
function uploadPhoto(k,id,file){let arr=get(k), e=arr.find(x=>x.id==id), url=file?URL.createObjectURL(file):'', a=analyze(e);scanTarget.innerHTML=`<div class="scan-box"><img src="${url}"><div class="scan-line"></div></div><p class="muted">AI Analysing...</p>`;setTimeout(()=>{e.photos=e.photos||[];e.photos.push({id:uid(),url,aiAnalysis:a});e.historyLog.push(hist(currentUser.id,'Photo uploaded','AI analysis completed'));set(k,arr);openDetail(k.slice(0,-1).replace(/^./,m=>m.toUpperCase()),id);toast('Photo analysed and saved')},650)}
function closeOverlay(){overlay.innerHTML=''} function toast(t){let el=document.createElement('div');el.className='toast';el.textContent=t;toastHost.appendChild(el);setTimeout(()=>el.remove(),3000)}
function quickAction(t,id){if(t=='Report')approveReport(id);else if(t=='Job')assignVendor(id);else assignExecutor(id)}
function approveReport(id){let r=get('reports');let e=r.find(x=>x.id==id);e.status='Finalized';e.historyLog.push(hist(currentUser.id,'Report approved','System feedback sent to QA owner'));set('reports',r);notify(e.responsibleQAId,`Approved: ${id} is finalized and ready for archive`,'Report',id,false);closeOverlay();render();toast('Approval sent - '+id+' finalized')}
function rejectReport(id){let note=prompt('Decline reason');if(!note)return;let r=get('reports'),e=r.find(x=>x.id==id);e.status='Rejected';e.rejectionComment=note;e.historyLog.push(hist(currentUser.id,'Report declined','System feedback sent: '+note));set('reports',r);notify(e.responsibleQAId,`Declined: ${id} needs revision - ${note}`,'Report',id,true);closeOverlay();render();toast('Decline feedback sent to QA')}
function deleteReport(id){if(!isSuper()||!confirm('Delete this report? Related incidents and jobs remain for audit.'))return;set('reports',get('reports').filter(x=>x.id!=id));closeOverlay();render();toast(id+' deleted')}
function assignReportQA(id,userId){let a=get('reports'),e=a.find(x=>x.id==id), old=e.responsibleQAId;e.responsibleQAId=userId;e.status=e.status=='Draft'?'Assigned':e.status;e.historyLog.push(hist(currentUser.id,'QA owner assigned',full(by('users',userId))));set('reports',a);notify(userId,`${id} assigned to you for inspection`,'Report',id,true);if(old&&old!=userId)notify(old,`${id} was reassigned to ${full(by('users',userId))}`,'Report',id,false);openDetail('Report',id);render();toast('Report assigned to '+full(by('users',userId)))}
function setReportStatus(id,st){let a=get('reports'),e=a.find(x=>x.id==id);e.status=st;e.historyLog.push(hist(currentUser.id,'Report status changed',st));set('reports',a);notify(e.responsibleQAId,`${id} status changed to ${st}`,'Report',id,st=='Rejected');openDetail('Report',id);render();toast('Report status updated')}
function setJobExecutor(id,userId){let a=get('jobs'),e=a.find(x=>x.id==id);e.executorId=userId;e.workflowStatus=userId?'AssignedToExecutor':'Unassigned';e.historyLog.push(hist(currentUser.id,userId?'Task reassigned':'Task unassigned',userId?full(by('users',userId)):'No executor'));set('jobs',a);if(userId)notify(userId,`${id} assigned to you`,'Job',id,true);openDetail('Job',id);render();toast(userId?'Task reassigned':'Task unassigned')}
function setIncidentExecutor(id,userId){let a=get('incidents'),e=a.find(x=>x.id==id);e.executorId=userId;e.workflowStatus=userId?'AssignedToExecutor':'Unassigned';e.historyLog.push(hist(currentUser.id,userId?'Incident reassigned':'Incident unassigned',userId?full(by('users',userId)):'No executor'));set('incidents',a);if(userId)notify(userId,`${id} assigned to you`,'Incident',id,true);openDetail('Incident',id);render();toast(userId?'Incident reassigned':'Incident unassigned')}
function saveIncidentDetail(id){let v=k=>document.getElementById('m_inc_'+k)?.value||'', a=get('incidents'),e=a.find(x=>x.id==id), it=by('items',v('itemId')), f=by('facilities',v('facilityId')), oldExec=e.executorId;if(!e||!it||!f){toast('Could not save incident details');return}e.name=v('name');e.priority=v('priority');e.facilityId=f.id;e.country=f.country;e.itemId=it.id;e.categoryId=it.categoryId;e.subCategoryId=it.subCategoryId;e.department=it.defaultDepartment;e.location=v('location');e.dueDate=new Date(v('dueDate')).toISOString();e.slaStatus=v('slaStatus');e.workflowStatus=v('workflowStatus');e.executorId=v('executorId');e.qaId=v('qaId');e.description=v('description');e.historyLog=e.historyLog||[];e.historyLog.push(hist(currentUser.id,'Incident details saved'));set('incidents',a);if(e.executorId&&e.executorId!=oldExec)notify(e.executorId,`${id} assigned to you`,'Incident',id,true);closeOverlay();render();toast(id+' saved')}
function assignVendor(id){let j=get('jobs'),e=j.find(x=>x.id==id), v=recommendVendor(e);e.vendorId=v.id;e.vendorAssistanceNeeded=false;e.workflowStatus='AssignedToVendor';e.historyLog.push(hist(currentUser.id,'Vendor assigned',v.companyName));set('jobs',j);notify(e.executorId,`${v.companyName} assigned to ${id}`,'Job',id,false);closeOverlay();render();toast(v.companyName+' assigned by AI recommendation')}
function assignExecutor(id){let inc=get('incidents'),e=inc.find(x=>x.id==id), u=recommendExecutor(e);e.executorId=u.id;e.workflowStatus='AssignedToExecutor';e.historyLog.push(hist(currentUser.id,'Executor assigned',full(u)));set('incidents',inc);notify(u.id,`New incident ${id} assigned to you`,'Incident',id,true);closeOverlay();render();toast(full(u)+' assigned')}
function reassignJob(id){let j=by('jobs',id), u=recommendExecutor(j);setJobExecutor(id,u.id)}
function recommendExecutor(e){return get('users').filter(u=>u.userType=='FieldSpecialist'&&(u.facilityIds.includes(e.facilityId))).map(u=>({u,open:get('jobs').filter(j=>j.executorId==u.id&&!['Closed','Approved'].includes(j.workflowStatus)).length})).sort((a,b)=>a.open-b.open)[0]?.u||get('users').find(u=>u.userType=='FieldSpecialist')} function recommendVendor(e){return get('vendors').map(v=>({v,s:v.rating*20+(10/v.avgResolutionDays)+(String(v.specialisation).toLowerCase().includes((by('items',e.itemId).defaultDepartment||'').toLowerCase())?15:0)})).sort((a,b)=>b.s-a.s)[0].v}
function statusJob(id,st){let j=get('jobs'),e=j.find(x=>x.id==id);e.workflowStatus=st;e.historyLog.push(hist(currentUser.id,'Status changed to '+st));set('jobs',j);openDetail('Job',id);render()} function statusIncident(id,st){let a=get('incidents'),e=a.find(x=>x.id==id);e.workflowStatus=st;e.historyLog.push(hist(currentUser.id,'Status changed to '+st));set('incidents',a);openDetail('Incident',id);render()}
function notify(userId,message,entityType,entityId,actionRequired){let n=get('notifications');n.unshift({id:uid(),userId,message,timestamp:today(),read:false,entityType,entityId,actionRequired});set('notifications',n)}
function notificationInScope(n){let k=n.entityType?.toLowerCase()+'s', e=by(k,n.entityId);if(!e&&n.entityType=='Report')e=by('reports',n.entityId);return !e||inScope(e)}
function renderBell(){let n=get('notifications').filter(x=>x.userId==currentUser.id&&!x.read&&notificationInScope(x)).length;bellCount.textContent=n;bellCount.classList.toggle('hidden',!n)} function toggleNotifications(){let m=notifMenu;m.classList.toggle('hidden');let ns=get('notifications').filter(x=>x.userId==currentUser.id&&notificationInScope(x)).slice(0,6);m.innerHTML=`<div class="card-h"><h2>Notifications</h2><button class="btn" onclick="markAllRead()">Mark all read</button></div>${ns.map(n=>`<button class="notif ${n.read?'':'unread'}" onclick="openDetail('${n.entityType}','${n.entityId}')" aria-label="${n.message.replaceAll('"','&quot;')}"><i data-lucide="${n.actionRequired?'circle-alert':'info'}"></i><span>${n.message}<span class="muted" style="display:block">${rel(n.timestamp)}</span></span></button>`).join('')||'<div class="notif-empty">No notifications</div>'}`;lucide.createIcons()} function markAllRead(){let n=get('notifications');n.forEach(x=>{if(x.userId==currentUser.id&&notificationInScope(x))x.read=true});set('notifications',n);renderBell();toggleNotifications()}
function resetDemoData(){if(!confirm('Reset all FMS demo data to defaults?'))return;let adminId=currentUser?.id;Object.keys(localStorage).filter(k=>k.startsWith('fms_')).forEach(k=>localStorage.removeItem(k));seed();currentUser=by('users',adminId)||by('users','u-super');localStorage.setItem('fms_current_admin_user',currentUser.id);state={page:'dashboard',tab:'users',facility:'all',query:'',filters:{},open:null};closeOverlay();renderShell();render();toast('Demo data reset')}
function saveAuth(role,k,v){let a=get('auth_settings'),x=a.find(y=>y.userType==role);x[k]=v;set('auth_settings',a);toast('Authentication settings saved')} function toggleUser(id){let a=get('users'),u=a.find(x=>x.id==id);u.status=u.status=='Active'?'Inactive':'Active';set('users',a);render()} function del(k,id){if(confirm('Delete this record?')){set(k,get(k).filter(x=>x.id!=id));render();toast('Deleted')}} 
function editUser(id){let u=id?by('users',id):{firstName:'',lastName:'',phone:'',email:'',employeeNumber:'',country:'UAE',department:'',position:'',userType:'FieldSpecialist',facilityIds:[],isQAReportReviewer:false,status:'Active'};modal('User',`<div class="form-grid">${['firstName','lastName','phone','email','employeeNumber','country','department','position'].map(k=>field(k,u[k])).join('')}<div class="form-row"><label>User Type</label><select id="m_userType" class="field">${['SuperUser','FacilityManager','QASpecialist','FieldSpecialist','Vendor'].map(r=>`<option ${u.userType==r?'selected':''}>${r}</option>`)}</select></div><div class="form-row"><label>Status</label><select id="m_status" class="field"><option ${u.status=='Active'?'selected':''}>Active</option><option ${u.status=='Inactive'?'selected':''}>Inactive</option></select></div></div>`,`saveUser('${id||''}')`)}
function saveUser(id){let a=get('users'),u=id?a.find(x=>x.id==id):{id:uid(),facilityIds:[]};['firstName','lastName','phone','email','employeeNumber','country','department','position','userType','status'].forEach(k=>u[k]=document.getElementById('m_'+k).value);u.avatarInitials=(u.firstName[0]+u.lastName[0]).toUpperCase();if(!id)a.push(u);set('users',a);closeOverlay();render();toast('User saved')}
function editVendor(id){let v=id?by('vendors',id):{companyName:'',country:'UAE',specialisation:'',representativeFirst:'',representativeLast:'',phone:'',email:'',rating:4.5,avgResolutionDays:2,totalJobsCompleted:0};modal('Vendor',`<div class="form-grid">${['companyName','country','specialisation','representativeFirst','representativeLast','phone','email','rating','avgResolutionDays','totalJobsCompleted'].map(k=>field(k,v[k])).join('')}</div>`,`saveVendor('${id||''}')`)} function saveVendor(id){let a=get('vendors'),v=id?a.find(x=>x.id==id):{id:uid()};['companyName','country','specialisation','representativeFirst','representativeLast','phone','email','rating','avgResolutionDays','totalJobsCompleted'].forEach(k=>v[k]=document.getElementById('m_'+k).value);if(!id)a.push(v);set('vendors',a);closeOverlay();render();toast('Vendor saved')}
function editIncident(){let f=allowedFacilities()[0], it=get('items')[0];modal('Incident',`<div class="form-grid">${field('name','New facility issue')}${field('location','Lobby')}${field('description','Describe the issue')}${field('dueDate',today(3).slice(0,10),'date')}<div class="form-row"><label>Facility</label><select id="m_facilityId" class="field">${allowedFacilities().map(x=>`<option value="${x.id}">${x.name}</option>`)}</select></div><div class="form-row"><label>Item</label><select id="m_itemId" class="field">${get('items').map(x=>`<option value="${x.id}">${x.name}</option>`)}</select></div></div>`,`saveIncident()`)}
function saveIncident(){let it=by('items',m_itemId.value), f=by('facilities',m_facilityId.value), a=get('incidents'), id='INC-'+String(a.length+1).padStart(4,'0');a.push({id,name:m_name.value,facilityId:f.id,country:f.country,location:m_location.value,categoryId:it.categoryId,subCategoryId:it.subCategoryId,itemId:it.id,description:m_description.value,creationMethod:'Manual',dueDate:new Date(m_dueDate.value).toISOString(),executorId:'',department:it.defaultDepartment,qaId:'u-omar',workflowStatus:'Unassigned',slaStatus:'OnTrack',priority:'Medium',dateCreated:today(),jobIds:[],photos:[],historyLog:[hist(currentUser.id,'Incident created')],sourceReportId:null,sourceChecklistItemId:null});set('incidents',a);closeOverlay();render();toast(id+' created')}
function field(k,v,type='text'){return `<div class="form-row"><label>${k.replace(/([A-Z])/g,' $1')}</label><input id="m_${k}" type="${type}" class="field" value="${String(v??'').replaceAll('"','&quot;')}"></div>`}
function modal(title,body,save){overlay.innerHTML=`<div class="backdrop" onclick="if(confirm('Unsaved changes - leave anyway?'))closeOverlay()"></div><section class="modal"><div class="panel-head"><h2 style="margin:0">${title}</h2><button class="icon-btn" onclick="closeOverlay()"><i data-lucide="x"></i></button></div><div class="panel-body">${body}<div class="toolbar" style="justify-content:flex-end;margin-top:16px"><button class="btn" onclick="closeOverlay()">Cancel</button><button class="btn primary" onclick="${save}">Save</button></div></div></section>`;lucide.createIcons()}
function openVendor(id){let v=by('vendors',id);modal(v.companyName,`<p><b>${v.specialisation}</b> · ${v.country}</p><p>Representative: ${v.representativeFirst} ${v.representativeLast}<br>${v.email}<br>${v.phone}</p><div class="grid kpis"><div class="card kpi"><small>Rating</small><strong>★ ${v.rating}</strong></div><div class="card kpi"><small>Avg Resolution</small><strong>${v.avgResolutionDays}d</strong></div><div class="card kpi"><small>Jobs</small><strong>${v.totalJobsCompleted}</strong></div></div>`,'closeOverlay()')}
function toggleChat(){chat.classList.toggle('hidden');if(!chat.classList.contains('hidden')&&!messages.innerHTML)messages.innerHTML=`<div class="msg">I can search live local data and help route work.</div><div class="suggestions">${['Show overdue jobs','Which facility has the lowest score?','What is pending vendor assignment?'].map(x=>`<button class="chip" onclick="chatInput.value='${x}';sendChat()">${x}</button>`).join('')}</div>`}
function sendChat(){let q=chatInput.value.trim();if(!q)return;messages.innerHTML+=`<div class="msg user">${q}</div>`;chatInput.value='';setTimeout(()=>{messages.innerHTML+=`<div class="msg">${bot(q)}</div>`;messages.scrollTop=messages.scrollHeight},500)}
function bot(q){q=q.toLowerCase();if(q.includes('overdue')||q.includes('sla')){let n=get('jobs').filter(j=>new Date(j.dueDate)<new Date()&&!['Closed','Approved'].includes(j.workflowStatus));state.page='jobs';state.filters.status='';render();return `${n.length} jobs are overdue. I opened the Jobs page so you can triage them.`}if(q.includes('vendor')){let n=get('jobs').filter(j=>j.vendorAssistanceNeeded&&!j.vendorId);return `${n.length} jobs are awaiting vendor assignment: ${n.map(x=>x.id).join(', ')||'none'}.`}if(q.includes('lowest')||q.includes('score')){let reps=get('reports').filter(r=>r.inspectionScore).sort((a,b)=>a.inspectionScore-b.inspectionScore);return `${by('facilities',reps[0].facilityId).name} has the lowest recent score at ${reps[0].inspectionScore}%.`}let m=q.match(/(inc|job|rpt)-\d+/i);if(m){let id=m[0].toUpperCase(), e=by(id.startsWith('INC')?'incidents':id.startsWith('JOB')?'jobs':'reports',id);return e?`${id}: ${e.workflowStatus||e.status}, ${e.priority||''} ${e.dueDate?'due '+fmt(e.dueDate):''}`:'I could not find '+id}if(q.includes('help'))return 'Try: overdue jobs, pending vendor, lowest score, incident INC-0003, job JOB-0001, report RPT-0001.';return "I didn't quite get that. Type help to see what I can do."}
window.addEventListener('storage',e=>{if(e.key&&e.key.startsWith('fms_')){render();toast('This record was updated in another window')}});document.addEventListener('DOMContentLoaded',init);
</script>
