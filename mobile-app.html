<script>
const S=k=>'fms_'+k, get=k=>JSON.parse(localStorage.getItem(S(k))||'[]'), set=(k,v)=>{try{localStorage.setItem(S(k),JSON.stringify(v))}catch(e){toast('Storage limit reached - clear old data to continue')}}; 
const appScreen=document.getElementById('screen');
let user=null, state={tab:'home',view:'list',report:null,step:0,answers:{},job:null,question:null}, chatOpen=false;
function uid(){return crypto.randomUUID?crypto.randomUUID():'id-'+Math.random().toString(16).slice(2)} function today(d=0){let x=new Date();x.setDate(x.getDate()+d);return x.toISOString()} function fmt(d){return new Date(d).toLocaleDateString(undefined,{month:'short',day:'numeric'})} function rel(d){let s=(Date.now()-new Date(d))/864e5;if(s<1)return Math.max(1,Math.round(s*24))+'h ago';return Math.round(s)+'d ago'} function by(k,id){return get(k).find(x=>x.id==id)} function full(u){return u?u.firstName+' '+u.lastName:'Unassigned'} function badge(v){return `<span class="status st-${String(v||'').toLowerCase().replaceAll(' ','').replaceAll('_','')}">${String(v||'').replace(/([A-Z])/g,' $1').trim()}</span>`}
function ensureSeed(){if(localStorage.getItem('fms_initialised'))return;localStorage.setItem('fms_initialised','true');set('users',[{id:'u-omar',firstName:'Omar',lastName:'Khalid',phone:'+971',email:'omar@fms.demo',employeeNumber:'EMP-003',country:'UAE',department:'QA',position:'QA Specialist',userType:'QASpecialist',facilityIds:['f-dubai','f-riyadh'],status:'Active',avatarInitials:'OK'},{id:'u-james',firstName:'James',lastName:'Wright',phone:'+971',email:'james@fms.demo',employeeNumber:'EMP-005',country:'UAE',department:'Maintenance',position:'Field Specialist',userType:'FieldSpecialist',facilityIds:['f-dubai'],status:'Active',avatarInitials:'JW'},{id:'u-manager',firstName:'Sara',lastName:'Hassan',phone:'+971',email:'sara@fms.demo',employeeNumber:'EMP-002',country:'UAE',department:'Facilities',position:'Facility Manager',userType:'FacilityManager',facilityIds:['f-dubai'],status:'Active',avatarInitials:'SH'}]);set('facilities',[{id:'f-dubai',name:'Dubai Main Branch',type:'Branch',country:'UAE',city:'Dubai',managerId:'u-manager'}]);set('categories',[{id:'c-branch',name:'Branch',description:'Branch assets'}]);set('subcategories',[{id:'sc-bank',categoryId:'c-branch',name:'Main Banking Hall',country:'UAE',locations:['Lobby']}]);set('items',[{id:'i-light',name:'Emergency Exit Light',defaultDepartment:'Electrical',categoryId:'c-branch',subCategoryId:'sc-bank',description:'',subItems:[]},{id:'i-ac',name:'Air Conditioning Unit',defaultDepartment:'HVAC',categoryId:'c-branch',subCategoryId:'sc-bank',description:'',subItems:[]}]);set('samples',[{id:'s-branch',name:'Branch Full Inspection',categoryId:'c-branch',sections:[{id:'sec1',questionText:'Validate emergency exit light function',linkedItemId:'i-light'},{id:'sec2',questionText:'Check AC outlet and visible condition',linkedItemId:'i-ac'}]}]);set('checklists',[{id:'cl-branch',name:'Dubai Branch Quarterly',sampleId:'s-branch',subCategoryId:'sc-bank',country:'UAE'}]);set('reports',[]);set('incidents',[]);set('jobs',[]);set('questions',[]);set('vendors',[{id:'v-gulf',companyName:'Gulf Tech Services',country:'UAE',representativeFirst:'Khaled',representativeLast:'Saeed',phone:'+971',email:'ops@gulf.demo',specialisation:'Electrical',rating:4.8,avgResolutionDays:1.8,totalJobsCompleted:47}]);set('notifications',[])}
function init(){ensureSeed();let id=localStorage.getItem('fms_current_mobile_user');user=id?by('users',id):null;render()} document.addEventListener('DOMContentLoaded',init);window.addEventListener('storage',e=>{if(e.key&&e.key.startsWith('fms_')){render();toast('Updated from another window')}})
function shell(title,sub,body,actions=''){let unread=user?get('notifications').filter(n=>n.userId==user.id&&!n.read).length:0, contextual=!!actions;appScreen.innerHTML=`<div class="statusbar"><span>9:41</span><span>FMS</span></div><header class="top ${contextual?'contextual':''}">${actions||''}<div class="title">${contextual?`<div class="crumb">${sub||'Detail'}</div>`:''}<h1>${title}</h1>${!contextual&&sub?`<p>${sub}</p>`:''}</div><div style="display:flex;gap:8px">${contextual?'':`<button class="icon-btn" onclick="goMobile('notifications')" aria-label="Notifications"><i data-lucide="bell"></i>${unread?'<span class="dot"></span>':''}</button>`}</div></header><section class="content">${body}</section>${nav()}`;lucide.createIcons()}
function renderMobileSkeleton(tab=state.tab){appScreen.innerHTML=`<div class="statusbar"><span>9:41</span><span>FMS</span></div><header class="top"><div class="title"><h1>Loading</h1><p>Refreshing view</p></div></header><section class="content"><div class="skeleton-mobile"></div><div class="skeleton-mobile"></div><div class="skeleton-mobile"></div></section>${navFor(tab)}`;lucide.createIcons()}
function goMobile(tab){state.tab=tab;state.view='list';renderMobileSkeleton(tab);setTimeout(render,110)}
function navFor(active){let isQA=user?.userType=='QASpecialist';let tabs=isQA?[['home','clipboard-check','Reports'],['ai','bot','AI'],['profile','user','Profile'],['more','menu','More']]:[['home','wrench','Jobs'],['incidents','triangle-alert','Incidents'],['profile','user','Profile'],['more','menu','More']];let fabHtml=isQA?`<button class="nav-fab" onclick="startInspection()" aria-label="Start New Inspection"><i data-lucide="plus"></i></button>`:`<button class="nav-fab" onclick="newIssue()" aria-label="Report New Issue"><i data-lucide="plus"></i></button>`;return `<nav class="nav">${tabs.map((t,i)=>{let h=`<button class="${active==t[0]?'active':''}" onclick="goMobile('${t[0]}')"><i data-lucide="${t[1]}"></i><span>${t[2]}</span></button>`;if(i==1)return h+`<div style="flex:0 0 60px;position:relative">${fabHtml}</div>`;return h}).join('')}</nav>`}
function nav(){return navFor(state.tab)}
function render(){if(!user)return login();if(user.userType=='QASpecialist')return renderQA();return renderField()}
function login(){appScreen.innerHTML=`<section class="login"><div class="mark">FMS</div><h1>Facility work, in motion.</h1><p>Choose a mobile role. Data syncs with the admin console through localStorage.</p><select id="loginUser" class="field">${get('users').filter(u=>['QASpecialist','FieldSpecialist'].includes(u.userType)).map(u=>`<option value="${u.id}">${full(u)} - ${u.userType.replace(/([A-Z])/g,' $1').trim()}</option>`).join('')}</select><button class="btn primary full" style="margin-top:12px" onclick="mobileLogin()">Continue</button><a class="btn full" style="margin-top:10px;text-decoration:none" href="admin-console.html">Open Admin Console</a></section>`}
function mobileLogin(){localStorage.setItem('fms_current_mobile_user',loginUser.value);user=by('users',loginUser.value);render()} function logout(){localStorage.removeItem('fms_current_mobile_user');user=null;render()}
function renderQA(){if(state.tab=='home')return state.view=='inspect'?inspection():state.view=='detail'?reportDetail():qaReports();if(state.tab=='ai')return aiPage();if(state.tab=='more')return moreMenu();if(state.tab=='questions')return questions();if(state.tab=='notifications')return notifications();return profile()}
function qaReports(){let reps=get('reports').filter(r=>r.responsibleQAId==user.id);shell('QA Reports','Inspections and approvals',`${reps.map(r=>reportCard(r)).join('')||empty('No inspections yet','Tap the + button below to start a new inspection.')}`)}
function reportCard(r){let score=r.inspectionScore||0, rail=score<70?'critical':score<85?'medium':'ontrack', editable=['Draft','Assigned','Rejected'].includes(r.status), action=editable?'beginReport':'openReport';return `<article class="card press mobile-card" onclick="${action}('${r.id}')"><span class="severity-rail severity-${rail}"></span><div class="row"><div><b>${r.id}</b><div class="muted small">${by('facilities',r.facilityId).name}</div></div>${badge(r.status)}</div><div class="meta-grid"><div><span>Checklist</span><b>${by('checklists',r.checklistId).name}</b></div><div><span>Score</span><b>${score?score+'%':'Not started'}</b></div></div><div class="next-cue">${editable?'Start inspection':'Open report'} <i data-lucide="chevron-right"></i></div></article>`}
function openReport(id){state.view='detail';state.report=id;render()}
function startInspection(){let fs=get('facilities').filter(f=>user.facilityIds.includes(f.id)), cls=get('checklists');sheet(`<h2>New Inspection</h2><div class="form-row"><label class="muted small">Branch</label><select id="new_facility" class="field">${fs.map(f=>`<option value="${f.id}">${f.name}</option>`).join('')}</select></div><div class="form-row" style="margin-top:10px"><label class="muted small">Questionnaire</label><select id="new_checklist" class="field">${cls.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select></div><button class="btn primary full" style="margin-top:12px" onclick="createInspection(new_facility.value,new_checklist.value)">Create and start</button>`)}
function createInspection(f,clId){let cl=by('checklists',clId), id='RPT-'+String(get('reports').length+1).padStart(4,'0'), sample=by('samples',cl.sampleId), fac=by('facilities',f);let r={id,facilityId:f,country:fac.country,location:by('subcategories',cl.subCategoryId)?.locations?.[0]||fac.city,categoryId:sample.categoryId,subCategoryId:cl.subCategoryId,checklistId:cl.id,responsibleQAId:user.id,dateCreated:today(),dateSubmitted:null,status:'Draft',rejectionComment:null,failedItemsCount:0,createdQuestionsCount:0,inspectionScore:0,inspectionResults:sample.sections.map(s=>({checklistItemId:s.id,questionText:s.questionText,itemId:s.linkedItemId,answer:null,photo:null,commentary:'',incidentId:null})),historyLog:[hist('Draft inspection started')]};let a=get('reports');a.unshift(r);set('reports',a);closeSheet();beginReport(id)}
function beginReport(id){let reps=get('reports'), r=reps.find(x=>x.id==id);if(!r.inspectionResults||!r.inspectionResults.length){let sample=by('samples',by('checklists',r.checklistId).sampleId);r.inspectionResults=sample.sections.map(s=>({checklistItemId:s.id,questionText:s.questionText,itemId:s.linkedItemId,answer:null,photo:null,commentary:'',incidentId:null}));r.historyLog=r.historyLog||[];r.historyLog.push(hist('Assigned inspection started'))}if(['Assigned','Rejected'].includes(r.status))r.status='Draft';set('reports',reps);state.report=id;state.step=0;state.view='inspect';render()}
function inspection(){let r=by('reports',state.report), total=r.inspectionResults.length;if(state.step>=total)return reviewSubmit(r);let x=r.inspectionResults[state.step], it=by('items',x.itemId);shell(`Item ${state.step+1} of ${total}`,by('facilities',r.facilityId).name,`<div class="inspection-content"><div class="progress"><span style="width:${(state.step+1)/total*100}%"></span></div><section class="card"><h2 style="margin:0 0 4px">${it.name}</h2><p class="muted">${x.questionText}</p>${photoBox(x.photo,`savePhoto('${r.id}',${state.step},this.files[0])`)}<div class="answer"><button class="btn good ${x.answer=='Pass'?'active':''}" onclick="answer('${r.id}',${state.step},'Pass')">Pass</button><button class="btn danger ${x.answer=='Fail'?'active':''}" onclick="answer('${r.id}',${state.step},'Fail')">Fail</button><button class="btn ${x.answer=='NA'?'active':''}" onclick="answer('${r.id}',${state.step},'NA')">N/A</button></div>${x.answer=='Fail'?'<div class="card" style="background:#fef2f2;color:#991b1b">An incident will be auto-created for this item.</div>':''}<textarea class="field" placeholder="Add observation note..." onchange="comment('${r.id}',${state.step},this.value)">${x.commentary||''}</textarea></section></div><div class="inspect-actions"><button class="btn" onclick="state.step=Math.max(0,state.step-1);render()">Previous</button><button class="btn primary" onclick="state.step++;render()">${state.step==total-1?'Review & Submit':'Next'}</button></div>`)}
function reviewSubmit(r){let pass=r.inspectionResults.filter(x=>x.answer=='Pass').length, fail=r.inspectionResults.filter(x=>x.answer=='Fail').length, na=r.inspectionResults.filter(x=>x.answer=='NA').length, score=Math.round(pass/Math.max(1,pass+fail)*100);shell('Review Summary',r.id,`<div class="inspection-content"><div class="card"><div class="ring" style="--score:${score}"><b>${score}%</b></div><div class="chips" style="justify-content:center"><span class="chip">${pass} passed</span><span class="chip">${fail} failed</span><span class="chip">${na} skipped</span></div></div>${r.inspectionResults.map(x=>`<div class="card"><div class="row"><div><b>${by('items',x.itemId).name}</b><div class="small muted">${x.questionText}</div></div>${badge(x.answer||'NA')}</div></div>`).join('')}</div><div class="review-actions"><button class="btn primary full" onclick="submitReport('${r.id}')">Submit for Review</button><button class="btn full" onclick="state.step=0;render()">Back to Edit</button></div>`)}
function submitReport(id){let reps=get('reports'), r=reps.find(x=>x.id==id), pass=r.inspectionResults.filter(x=>x.answer=='Pass').length, fail=r.inspectionResults.filter(x=>x.answer=='Fail').length;r.status='Submitted';r.dateSubmitted=today();r.failedItemsCount=fail;r.inspectionScore=Math.round(pass/Math.max(1,pass+fail)*100);r.historyLog.push(hist('Report submitted'));let inc=get('incidents'), jobs=get('jobs');r.inspectionResults.filter(x=>x.answer=='Fail').forEach(x=>{let iid='INC-'+String(inc.length+1).padStart(4,'0'), jid='JOB-'+String(jobs.length+1).padStart(4,'0'), it=by('items',x.itemId);x.incidentId=iid;inc.unshift({id:iid,name:it.name+' inspection failure',facilityId:r.facilityId,country:r.country,location:r.location,categoryId:it.categoryId,subCategoryId:it.subCategoryId,itemId:it.id,description:x.commentary||'Failed inspection item',creationMethod:'AutoFromInspection',dueDate:today(3),executorId:'',department:it.defaultDepartment,qaId:user.id,workflowStatus:'Unassigned',slaStatus:'OnTrack',priority:'High',dateCreated:today(),jobIds:[jid],photos:x.photo?[x.photo]:[],historyLog:[hist('Auto-created from inspection')],sourceReportId:r.id,sourceChecklistItemId:x.checklistItemId});jobs.unshift({id:jid,relatedIncidentId:iid,facilityId:r.facilityId,description:'Repair '+it.name,itemId:it.id,categoryId:it.categoryId,subCategoryId:it.subCategoryId,priority:'High',workflowStatus:'Unassigned',executorId:'',vendorId:null,qaId:user.id,dueDate:today(3),department:it.defaultDepartment,vendorAssistanceNeeded:false,escalationNote:'',dateCreated:today(),photos:[],historyLog:[hist('Job created from failed inspection')]})});set('reports',reps);set('incidents',inc);set('jobs',jobs);notify('u-manager',`${r.id} submitted by ${full(user)} - awaiting your review`,'Report',r.id,true);state.view='detail';toast('Report submitted');render()}
function reportDetail(){let r=by('reports',state.report);shell(r.id,by('facilities',r.facilityId).name,`<div class="card"><div class="ring" style="--score:${r.inspectionScore||0}"><b>${r.inspectionScore||0}%</b></div><div class="chips" style="justify-content:center">${badge(r.status)}<span class="chip">${r.failedItemsCount} failed</span><span class="chip">${fmt(r.dateCreated)}</span></div></div>${r.status=='Finalized'?'<div class="card" style="background:#f0fdf4;color:#166534"><b>Approved by Facility Manager</b></div>':''}${r.status=='Rejected'?`<div class="card" style="background:#fef2f2;color:#991b1b"><b>Rejected</b><br>${r.rejectionComment||''}</div>`:''}${r.inspectionResults.map(x=>`<div class="card"><div class="row"><b>${by('items',x.itemId).name}</b>${badge(x.answer||'NA')}</div><p class="small muted">${x.questionText}</p>${x.photo?aiCard(x.photo.aiAnalysis):''}</div>`).join('')}<button class="btn full" onclick="window.print()">Export / Share</button>`,`<button class="icon-btn" onclick="state.view='list';render()"><i data-lucide="arrow-left"></i></button>`)}
function renderField(){if(state.tab=='home')return state.view=='detail'?jobDetail():jobsList();if(state.tab=='incidents')return incidentsList();if(state.tab=='ai')return aiPage();if(state.tab=='more')return moreMenu();if(state.tab=='questions')return questions();if(state.tab=='notifications')return notifications();return profile()}
function moreMenu(){let unread=get('notifications').filter(n=>n.userId==user.id&&!n.read).length, isQA=user?.userType=='QASpecialist';shell('More','Menus and settings',`<div class="card press" style="padding:16px" onclick="goMobile('notifications')"><div class="row"><b><i data-lucide="bell" style="width:18px;margin-right:10px;vertical-align:-4px"></i>Alerts${unread?` <span style="background:var(--red);color:#fff;border-radius:10px;padding:2px 8px;font-size:10px;margin-left:4px">${unread}</span>`:''}</b><i data-lucide="chevron-right"></i></div></div><div class="card press" style="padding:16px" onclick="goMobile('questions')"><div class="row"><b><i data-lucide="circle-help" style="width:18px;margin-right:10px;vertical-align:-4px"></i>Questions</b><i data-lucide="chevron-right"></i></div></div>${isQA?'':`<div class="card press" style="padding:16px" onclick="goMobile('ai')"><div class="row"><b><i data-lucide="bot" style="width:18px;margin-right:10px;vertical-align:-4px"></i>FMS AI</b><i data-lucide="chevron-right"></i></div></div>`}`)}
function jobsList(){let rows=get('jobs').filter(j=>j.executorId==user.id||(!j.executorId&&user.facilityIds.includes(j.facilityId))).sort((a,b)=>prio(b.priority)-prio(a.priority)||new Date(a.dueDate)-new Date(b.dueDate));shell('My Jobs','Priority queue and field execution',rows.map(j=>jobCard(j)).join('')||empty('No jobs','Assigned work will appear here.',"state.tab='incidents';render()",'View incidents'))}
function jobCard(j){let overdue=new Date(j.dueDate)<new Date(), rail=overdue?'overdue':String(j.priority||'low').toLowerCase();return `<article class="card press mobile-card" onclick="state.job='${j.id}';state.view='detail';render()"><span class="severity-rail severity-${rail}"></span><div class="row"><div><b>${j.id}</b><div class="muted small">${by('items',j.itemId).name} · ${j.relatedIncidentId}</div></div>${badge(j.priority)}</div><div class="meta-grid"><div><span>Status</span><b>${String(j.workflowStatus).replace(/([A-Z])/g,' $1').trim()}</b></div><div><span>Due</span><b style="color:${overdue?'var(--red)':'inherit'}">${fmt(j.dueDate)}</b></div></div><div class="next-cue">${nextJobAction(j)} <i data-lucide="chevron-right"></i></div></article>`}
function nextJobAction(j){if(!j.executorId)return'Accept and assign';if(j.workflowStatus=='AssignedToExecutor')return'Start work';if(j.workflowStatus=='InProgress')return'Submit for review';if(j.vendorAssistanceNeeded&&!j.vendorId)return'Escalation pending';return'Open job'}
function jobDetail(){let j=by('jobs',state.job);shell(j.id,by('items',j.itemId).name,`<div class="card"><div class="chips">${badge(j.priority)}${badge(j.workflowStatus)}${new Date(j.dueDate)<new Date()?badge('Overdue'):badge('OnTrack')}</div><p>${j.description}</p><p class="muted small">${by('facilities',j.facilityId).name}<br>Due ${fmt(j.dueDate)} · Incident ${j.relatedIncidentId}</p></div><div class="card"><h3>Actions</h3><button class="btn primary full" onclick="jobStatus('${j.id}','InProgress')">Start Work</button><button class="btn good full" style="margin-top:8px" onclick="jobStatus('${j.id}','UnderReview')">Submit for Review</button><button class="btn full" style="margin-top:8px" onclick="escalateSheet('${j.id}')">Request Escalation</button></div><div class="card"><h3>Evidence</h3>${photoBox(null,`saveJobPhoto('${j.id}',this.files[0])`)}${(j.photos||[]).map(p=>aiCard(p.aiAnalysis)).join('')}</div><div class="card"><h3>History</h3>${history(j)}</div>`,`<button class="icon-btn" onclick="state.view='list';render()"><i data-lucide="arrow-left"></i></button>`)}
function incidentsList(){let rows=get('incidents').filter(i=>user.facilityIds.includes(i.facilityId));shell('Incidents','Context for assigned facilities',`${rows.map(i=>`<div class="card mobile-card"><span class="severity-rail severity-${String(i.slaStatus).toLowerCase()}"></span><div class="row"><div><b>${i.id}</b><div class="muted small">${by('items',i.itemId).name}</div></div>${badge(i.slaStatus)}</div><div class="chips">${badge(i.priority)}${badge(i.workflowStatus)}</div></div>`).join('')||empty('No incidents','No incident records are linked to your facilities.')}`)}
function newIssue(){sheet(`<h2>Report New Issue</h2><input id="ni_name" class="field" placeholder="Incident name"><textarea id="ni_desc" class="field" placeholder="Description" style="margin-top:8px"></textarea><select id="ni_item" class="field" style="margin-top:8px">${get('items').map(i=>`<option value="${i.id}">${i.name}</option>`)}</select><button class="btn primary full" style="margin-top:12px" onclick="saveIssue()">Create Incident</button>`)} function saveIssue(){let it=by('items',ni_item.value), f=user.facilityIds[0], a=get('incidents'), id='INC-'+String(a.length+1).padStart(4,'0');a.unshift({id,name:ni_name.value||'Field reported issue',facilityId:f,country:by('facilities',f).country,location:'Field reported',categoryId:it.categoryId,subCategoryId:it.subCategoryId,itemId:it.id,description:ni_desc.value,creationMethod:'Manual',dueDate:today(3),executorId:user.id,department:it.defaultDepartment,qaId:'u-omar',workflowStatus:'AssignedToExecutor',slaStatus:'OnTrack',priority:'Medium',dateCreated:today(),jobIds:[],photos:[],historyLog:[hist('Incident reported from mobile')],sourceReportId:null,sourceChecklistItemId:null});set('incidents',a);closeSheet();toast(id+' created');render()}
function questions(){let rows=get('questions').filter(q=>user.userType=='QASpecialist'?q.relatedReportId&&by('reports',q.relatedReportId)?.responsibleQAId==user.id:q.responsibleExecutorId==user.id);shell('Questions','Threads needing clarification',rows.map(q=>`<article class="card press mobile-card" onclick="questionSheet('${q.id}')"><span class="severity-rail severity-${String(q.priority||'low').toLowerCase()}"></span><div class="row"><b>${q.id}</b>${badge(q.workflowStatus)}</div><p>${q.text}</p><div class="muted small">${q.relatedJobId||q.relatedIncidentId||q.relatedReportId||''}</div><div class="next-cue">Open thread <i data-lucide="chevron-right"></i></div></article>`).join('')||empty('No questions','New clarification threads will appear here.'))}
function questionSheet(id){let q=by('questions',id);sheet(`<h2>${q.id}</h2><p>${q.text}</p>${(q.responses||[]).map(r=>`<div class="card"><b>${full(by('users',r.userId))}</b><p>${r.text}</p><div class="muted small">${rel(r.timestamp)}</div></div>`).join('')}<textarea id="q_resp" class="field" placeholder="Add response"></textarea><button class="btn primary full" style="margin-top:8px" onclick="respond('${id}')">Submit</button>`)} function respond(id){let qs=get('questions'),q=qs.find(x=>x.id==id);q.responses=q.responses||[];q.responses.push({userId:user.id,text:q_resp.value,photoUrl:null,timestamp:today()});q.workflowStatus='Responded';q.historyLog.push(hist('Question responded'));set('questions',qs);closeSheet();toast('Response sent');render()}
function notifications(){let ns=get('notifications').filter(n=>n.userId==user.id);shell('Notifications','Alerts and approvals',`<button class="btn full" onclick="markRead()">Mark all read</button>${ns.map(n=>`<div class="card ${n.read?'':'press'} mobile-card"><span class="severity-rail severity-${n.actionRequired?'high':'low'}"></span><div class="row"><b>${n.entityId}</b>${n.read?'':badge('New')}</div><p>${n.message}</p><div class="muted small">${rel(n.timestamp)}</div></div>`).join('')||empty('No notifications','You are caught up.')}`)}
function profile(){let auth=get('auth_settings').find(a=>a.userType==user.userType)||{};shell('Profile',full(user),`<div class="card" style="text-align:center"><div class="avatar" style="width:76px;height:76px;margin:auto;font-size:24px">${user.avatarInitials}</div><h2>${full(user)}</h2><p class="muted">${user.position}<br>${user.department}</p></div><div class="card"><b>Facilities</b><div class="chips">${user.facilityIds.map(id=>`<span class="chip">${by('facilities',id)?.name||id}</span>`).join('')}</div></div><div class="card"><b>Auth Settings</b><p class="muted small">Mobile: ${auth.mobileAuth||user.mobileAuthMethod||'SMS_OTP'}<br>Desktop: ${auth.desktopAuth||'None'}</p></div><button class="btn full" onclick="logout()">Switch User</button><p class="muted small" style="text-align:center">FMS Mobile v1.0</p>`)}
function photoBox(photo,handler){return `<label class="photo">${photo?`<img src="${photo.url}">`:`<div><i data-lucide="camera"></i><br>Tap to photograph this item</div>`}<input type="file" accept="image/*" class="hidden" onchange="${handler}"></label>${photo?aiCard(photo.aiAnalysis):''}`}
function savePhoto(id,idx,file){let reps=get('reports'),r=reps.find(x=>x.id==id),x=r.inspectionResults[idx],url=file?URL.createObjectURL(file):'';x.photo={id:uid(),url,aiAnalysis:analyze(x)};set('reports',reps);toast('AI analysis complete');render()} function answer(id,idx,val){let reps=get('reports'),r=reps.find(x=>x.id==id);r.inspectionResults[idx].answer=val;set('reports',reps);render()} function comment(id,idx,val){let reps=get('reports'),r=reps.find(x=>x.id==id);r.inspectionResults[idx].commentary=val;set('reports',reps)}
function saveJobPhoto(id,file){let jobs=get('jobs'),j=jobs.find(x=>x.id==id),url=file?URL.createObjectURL(file):'';j.photos=j.photos||[];j.photos.push({id:uid(),url,aiAnalysis:analyze(j)});j.historyLog.push(hist('Photo uploaded with AI analysis'));set('jobs',jobs);toast('Evidence analysed');render()}
function analyze(ctx){let it=by('items',ctx.itemId)||{}, cat=by('categories',it.categoryId)||{name:'Branch'}, pools={ATM:['Cash Acceptor','Card Reader','Screen','Receipt Printer'],Branch:['CCTV Camera','Emergency Light','Fire Extinguisher','AC Unit'],Office:['Access Terminal','Fire Alarm Panel','UPS System']}, cond=cat.name=='Office'?['Good','WornNormal']:['Good','WornNormal','Damaged','Critical'];let c=cond[Math.floor(Math.random()*cond.length)];return{detectedObject:(pools[cat.name]||pools.Branch)[Math.floor(Math.random()*(pools[cat.name]||pools.Branch).length)],condition:c,conditionLabel:{Good:'Good condition',WornNormal:'Normal wear visible',Damaged:'Damage detected',Critical:'Critical repair needed'}[c],confidence:78+Math.floor(Math.random()*20),tags:[cat.name.toLowerCase(),'maintenance-due']}}
function aiCard(a){return `<div class="ai"><div class="ai-head"><b>AI Analysis</b><span class="muted">${a.confidence}% confidence</span></div><div class="confidence"><span style="width:${a.confidence}%"></span></div><div><b>Detected:</b> ${a.detectedObject}</div><div><b>Condition:</b> ${badge(a.condition)} ${a.conditionLabel||''}</div><div class="chips">${a.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div></div>`}
function jobStatus(id,st){let jobs=get('jobs'),j=jobs.find(x=>x.id==id);if(!j.executorId)j.executorId=user.id;j.workflowStatus=st;j.historyLog.push(hist('Status changed to '+st));set('jobs',jobs);if(st=='UnderReview')notify(j.qaId||'u-omar',`${j.id} submitted for review by ${full(user)}`,'Job',j.id,true);toast('Status updated');render()}
function escalateSheet(id){let j=by('jobs',id), rec=recommendVendor(j);sheet(`<h2>Request Escalation</h2><textarea id="esc_note" class="field" placeholder="Escalation reason"></textarea>${get('vendors').map(v=>`<div class="card"><div class="row"><div><b>${v.companyName}</b><div class="muted small">${v.specialisation} · ★ ${v.rating}</div><div class="small">Avg resolution: ${v.avgResolutionDays} days · ${v.totalJobsCompleted} jobs completed</div></div>${v.id==rec.id?badge('AI Recommended'):''}</div></div>`).join('')}<button class="btn primary full" onclick="submitEsc('${id}','${rec.id}')">Submit Escalation</button>`)}
function submitEsc(id,vendorId){let jobs=get('jobs'),j=jobs.find(x=>x.id==id);j.vendorAssistanceNeeded=true;j.vendorId=vendorId;j.workflowStatus='AssignedToVendor';j.escalationNote=esc_note.value;j.historyLog.push(hist('Escalated to vendor',by('vendors',vendorId).companyName));set('jobs',jobs);notify('u-manager',`${id} escalated to vendor by ${full(user)}`,'Job',id,true);closeSheet();toast('Escalation submitted');render()} function recommendVendor(e){return get('vendors').map(v=>({v,s:v.rating*20+(10/v.avgResolutionDays)+(String(v.specialisation).toLowerCase().includes((by('items',e.itemId).defaultDepartment||'').toLowerCase())?15:0)})).sort((a,b)=>b.s-a.s)[0].v}
function notify(userId,message,entityType,entityId,actionRequired){let n=get('notifications');n.unshift({id:uid(),userId,message,timestamp:today(),read:false,entityType,entityId,actionRequired});set('notifications',n)}
function markRead(){let n=get('notifications');n.forEach(x=>{if(x.userId==user.id)x.read=true});set('notifications',n);render()} function hist(action,detail=null){return{timestamp:today(),userId:user?.id||'system',userName:user?full(user):'System',action,detail}}
function history(e){return (e.historyLog||[]).slice().reverse().map(h=>`<div class="timeline item"><span class="avatar" style="width:28px;height:28px">${h.userName.split(' ').map(x=>x[0]).join('').slice(0,2)}</span><div><b>${h.action}</b><div class="muted small">${h.userName} · ${rel(h.timestamp)}</div></div></div>`).join('')||'<p class="muted">No history yet.</p>'}
function sheet(html){document.getElementById('screen').insertAdjacentHTML('beforeend',`<div class="shade" onclick="closeSheet()"></div><section class="sheet" id="sheet">${html}</section>`);lucide.createIcons()} function closeSheet(){document.querySelector('.shade')?.remove();document.getElementById('sheet')?.remove()}
function toast(t){let el=document.createElement('div');el.className='toast';el.textContent=t;appScreen.appendChild(el);setTimeout(()=>el.remove(),2600)} function empty(h,p,action='',label='Clear filters'){return `<div class="empty-mobile"><i data-lucide="inbox"></i><h3>${h}</h3><p>${p}</p>${action?`<button class="btn" onclick="${action}">${label}</button>`:''}</div>`} function prio(p){return {Critical:4,High:3,Medium:2,Low:1}[p]||0}
function aiPage(){shell('FMS AI','Operational assistant',`<section class="chat"><div class="messages" id="msgs"><div class="msg">Ask me for overdue jobs, lowest score, pending vendor work, or start inspection.</div><div class="chips"><button class="chip" onclick="chatIn.value='overdue jobs';sendChat()">Overdue jobs</button><button class="chip" onclick="chatIn.value='pending vendor';sendChat()">Pending vendor</button><button class="chip" onclick="chatIn.value='start inspection';sendChat()">Start inspection</button></div></div><div style="display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)"><input id="chatIn" class="field" placeholder="Ask FMS AI..."><button class="btn primary" onclick="sendChat()" aria-label="Send"><i data-lucide="send"></i></button></div></section>`)}
function toggleChat(){state.tab='ai';state.view='list';render()} function chatBox(){return ''}
function sendChat(){let q=chatIn.value.trim();if(!q)return;msgs.innerHTML+=`<div class="msg user">${q}</div>`;chatIn.value='';setTimeout(()=>msgs.innerHTML+=`<div class="msg">${bot(q)}</div>`,450)}
function bot(q){q=q.toLowerCase();if(q.includes('overdue'))return `${get('jobs').filter(j=>new Date(j.dueDate)<new Date()&&!['Closed','Approved'].includes(j.workflowStatus)).length} overdue jobs found.`;if(q.includes('vendor'))return `${get('jobs').filter(j=>j.vendorAssistanceNeeded&&!j.vendorId).length} jobs are pending vendor assignment.`;if(q.includes('inspection')||q.includes('start')){if(user.userType=='QASpecialist'){startInspection();return 'Starting a new inspection.'}return 'Inspections are available for QA Specialists.'}let m=q.match(/(inc|job|rpt)-\d+/i);if(m){let id=m[0].toUpperCase(), e=by(id.startsWith('INC')?'incidents':id.startsWith('JOB')?'jobs':'reports',id);return e?`${id}: ${e.workflowStatus||e.status}, ${e.priority||''}`:'I could not find '+id}return 'Try overdue jobs, pending vendor, start inspection, or JOB-0001.'}
</script>
